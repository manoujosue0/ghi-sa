<section>
  <div class="cities-container">
    <div class="cities-grid">
      <div class="city-card" onclick="openBox('fonciere.html')">
        <img src="image/california.jpeg" alt="California">
        <div class="city-overlay"><h3>California</h3></div>
      </div>
      <div class="city-card" onclick="openBox('nyc.html')">
        <img src="image/nyc.jpg" alt="New York">
        <div class="city-overlay"><h3>New York</h3></div>
      </div>
      <div class="city-card" onclick="openBox('florida.html')">
        <img src="image/florida.jpg" alt="Florida">
        <div class="city-overlay"><h3>Florida</h3></div>
      </div>
      <div class="city-card" onclick="openBox('texas.html')">
        <img src="image/texas.jpg" alt="Texas">
        <div class="city-overlay"><h3>Texas</h3></div>
      </div>
      <div class="city-card" onclick="openBox('france.html')">
        <img src="image/france.jpg" alt="France">
        <div class="city-overlay"><h3>France</h3></div>
      </div>
      <div class="city-card" onclick="openBox('london.html')">
        <img src="image/london.avif" alt="United Kingdom">
        <div class="city-overlay"><h3>United Kingdom</h3></div>
      </div>
    </div>
  </div>
</section>

<!-- MODAL POPUP -->
<div id="popupBox" class="popup-box">
  <div class="popup-content">
    <span class="close-btn" onclick="closeBox()">×</span>
    <iframe id="popupFrame" src="" frameborder="0"></iframe>
  </div>
</div>

<style>
  /* Grid layout */
  .cities-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
  }

  .city-card {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    border-radius: 15px;
    transition: transform 0.3s ease;
  }

  .city-card:hover {
    transform: scale(1.05);
  }

  .city-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
  }

  .city-overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    color: white;
    text-align: center;
    padding: 10px 0;
  }

  /* Popup styling */
  .popup-box {
    display: none; 
    position: fixed; 
    z-index: 1000; 
    left: 0; 
    top: 0;
    width: 100%; 
    height: 100%;
    background-color: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
  }

  .popup-content {
    position: relative;
    background: #fff;
    width: 80%;
    height: 80%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
  }

  .close-btn {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 28px;
    font-weight: bold;
    color: #333;
    cursor: pointer;
    z-index: 2;
  }

  .close-btn:hover {
    color: red;
  }

  iframe {
    flex: 1;
    width: 100%;
    height: 100%;
    border: none;
  }
</style>

<script>
  function openBox(url) {
    const popup = document.getElementById('popupBox');
    const frame = document.getElementById('popupFrame');
    frame.src = url;
    popup.style.display = 'flex';
  }

  function closeBox() {
    const popup = document.getElementById('popupBox');
    const frame = document.getElementById('popupFrame');
    frame.src = '';
    popup.style.display = 'none';
  }
</script>
